name: Generate GitHub stats card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  update:
    name: Update stats card
    runs-on: ubuntu-latest
    steps:
      - uses: datarootsio/github-stats-card@v1
        with:
          username: bombel1337
          gh_token_stats: ${{ secrets.GH_PAT }}
          gh_token_commits: ${{ secrets.GITHUB_TOKEN }}
          badge_path: images/github-stats-card.svg
          header: " hi i'm"
          about: "Full-stack developer from Warsaw.\nGo backends, Next.js, automation and robotics."
          theme: dark
          commit_message: Update GitHub stats card
